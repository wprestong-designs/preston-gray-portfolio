<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Proof not found — Preston Gray</title>
    <style>
      /* Self-contained (Netlify serves this for any unmatched path; no SPA/JS
         needed). Print-shop vocabulary: ink on paper, mono label, hard shadow. */
      :root {
        --ink: #171717;
        --paper: #ffffff;
        --pink: #f72585;
        --mono: 'IBM Plex Mono', ui-monospace, Consolas, monospace;
        --sans: 'Inter', system-ui, 'Segoe UI', sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .np { max-width: 560px; text-align: left; }
      .np__stamp {
        display: inline-block;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--pink);
        border: 3px solid var(--pink);
        padding: 8px 14px;
        transform: rotate(-4deg);
        margin-bottom: 28px;
      }
      .np__code { font-family: var(--mono); font-size: 13px; letter-spacing: 0.14em; color: #737373; margin: 0 0 8px; }
      .np__title { font-size: clamp(30px, 7vw, 52px); font-weight: 800; line-height: 1.03; letter-spacing: -0.01em; margin: 0 0 14px; }
      .np__sub { font-size: 17px; color: #404040; margin: 0 0 28px; }
      .np__home {
        display: inline-block;
        min-height: 48px;
        padding: 13px 26px;
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--paper);
        background: var(--ink);
        border: 2px solid var(--ink);
        box-shadow: 4px 4px 0 var(--ink);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .np__home:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
      @media (prefers-reduced-motion: reduce) { .np__home { transition: none; } }
    </style>
  </head>
  <body>
    <main class="np">
      <p class="np__stamp">Proof not found</p>
      <p class="np__code">Error 404 · no such page</p>
      <h1 class="np__title">This one didn&rsquo;t make the catalog.</h1>
      <p class="np__sub">
        The page you were after isn&rsquo;t here — moved, mistyped, or never
        printed. Head back to the index and pick up the trail.
      </p>
      <a class="np__home" href="/">Back to the index</a>
    </main>
  </body>
</html>
