<!doctype html>
<html lang="en" data-theme="memphis">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- U2: viewport-fit=cover so env(safe-area-inset-*) resolves on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#171717" />
    <meta
      name="description"
      content="Preston Gray helps small businesses look as good as the work they do — websites, customer materials, social posts, brand basics, and simple systems that make it easier to get found and chosen."
    />
    <title>Preston Gray — Websites &amp; Practical Marketing Help for Small Businesses</title>
    <link rel="canonical" href="https://preston-gray.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Preston Gray — Websites & Practical Marketing Help for Small Businesses" />
    <meta
      property="og:description"
      content="Preston Gray helps small businesses look as good as the work they do — websites, customer materials, social posts, brand basics, and simple systems that make it easier to get found and chosen."
    />
    <meta property="og:url" content="https://preston-gray.com/" />
    <!-- P5: generated by scripts/capture-og.mjs (Registration/canonical) -->
    <meta property="og:image" content="https://preston-gray.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Six-shape print-registration composition — the Preston Gray proof catalog" />
    <meta name="twitter:image" content="https://preston-gray.com/og.png" />
    <meta name="twitter:image:alt" content="Six-shape print-registration composition — the Preston Gray proof catalog" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- P7 all-sans system: Archivo (display, variable wght+wdth),
         Inter (body), IBM Plex Mono (labels). Fraunces retired. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Contact form is host-agnostic (Web3Forms): ContactLayer POSTs JSON
         straight to api.web3forms.com, so no static form definition is needed
         here. (Removed the Netlify build-detection stub during the Cloudflare
         migration.) -->
    <div id="root">
      <!-- §B crawlable skeleton: real HTML for crawlers/unfurlers that don't run
           JS (the poster is an SPA). React's createRoot REPLACES this on mount,
           so users never see it. Copy is the existing approved h1 + description.
           True prerender gap for the homepage is logged. -->
      <main>
        <h1>I help small businesses look as good as the work they do.</h1>
        <p>
          Preston Gray — websites, customer materials, social posts, brand
          basics, and simple systems that make small businesses easier to find
          and choose. Denver, Colorado.
        </p>
        <nav>
          <a href="/work/">Selected work</a>
          <a href="/small-business/">For business owners</a>
          <a href="mailto:hello@preston-gray.com">Contact</a>
        </nav>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
